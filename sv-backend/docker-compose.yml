version: '3.8'

services:
  # -------------------------
  # DATABASES
  # -------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sv-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexretail
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: sv-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # -------------------------
  # MICROSERVICES
  # -------------------------
  transaction-service:
    build: 
      context: .. # Root context so it can access sv-shared
      dockerfile: sv-backend/sv-transaction-service/Dockerfile
    container_name: sv-transaction-service
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/nexretail?schema=public
      - PORT=3001
    depends_on:
      - postgres

  user-service:
    build: 
      context: ..
      dockerfile: sv-backend/sv-user-service/Dockerfile
    container_name: sv-user-service
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/nexretail?schema=public
      - PORT=3002
    depends_on:
      - postgres

  vision-service:
    build:
      context: ..
      dockerfile: sv-backend/sv-vision-service/Dockerfile
    container_name: sv-vision-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003

volumes:
  pgdata:
  chdata:
