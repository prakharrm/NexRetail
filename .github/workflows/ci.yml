name: CI Pipeline

on:
  pull_request:
    branches: master
  push:
    branches: master 

jobs: 
  test: 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [
          'sv-client', 
          'sv-shared', 
          'sv-backend/sv-transaction-service',
          'sv-backend/sv-user-service',
          'sv-backend/sv-vision-service'
        ]
    
    defaults:
      run:
        working-directory: ./${{ matrix.directory }}

    steps:
    - name: Check out Code
      uses: actions/checkout@v4
    
    - name: setup node 
      uses: actions/setup-node@v4
      with:  
        node-version: '22'
    
    - name: Install dependencies
      run: npm ci

    - name: Run Tests
      run: npm test